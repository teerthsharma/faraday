name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check faraday/ tests/
      - run: ruff format --check faraday/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy faraday/ --ignore-missing-imports

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # Light scheduling — only run macOS/Windows on the latest Python.
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=faraday --cov-report=xml --cov-report=term-missing --cov-fail-under=80
      - name: Smoke test
        run: |
          python -c "from faraday import GodTensor, solve_cavity_modes, coupled_fingerprint; print('import OK')"
          python -c "from faraday.cli import main; print('cli OK')"
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  validation:
    name: Held-out Generalisation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Held-out generalisation experiment
        run: |
          python -m faraday.benchmarking --suite small --validate 2>&1 | tee validation.log
      - name: Verify generalisation thresholds
        run: |
          python <<'PY'
          import re, sys
          with open('validation.log') as f:
              text = f.read()
          m = re.search(r'mean_E_err=([0-9.]+)\s+\|\s+mean_H_err=([0-9.]+)', text)
          if not m:
              print('ERROR: could not parse validation results', file=sys.stderr)
              sys.exit(1)
          e_err = float(m.group(1))
          h_err = float(m.group(2))
          if e_err > 0.5 or h_err > 0.5:
              print(f'FAIL: E_err={e_err}, H_err={h_err} exceed threshold 0.5')
              sys.exit(1)
          print(f'PASS: E_err={e_err}, H_err={h_err}')
          PY

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[doc]"
      - name: Build Sphinx docs
        run: |
          cd docs && python -m sphinx -W --keep-going -b html source build/html

  benchmark:
    name: Micro Benchmarks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bench]"
      - name: Run micro benchmark suite
        run: python -m faraday.benchmarking --suite micro --output ./bench_artifacts
      - name: Upload benchmark JSON
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: ./bench_artifacts/
          retention-days: 14
